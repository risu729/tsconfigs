# ref: https://mise.jdx.dev/configuration.html
#:schema https://mise.jdx.dev/schema/mise.json

[tools]
hk = "1.48.0"
bun = "1.3.14"
node = "26.4.0"
"npm:semantic-release" = "25.0.5"
oxlint = "1.71.0"
oxfmt = "0.56.0"
actionlint = "1.7.12"
# required for actionlint
shellcheck = "0.11.0"
ghalint = "1.5.6"
pinact = "4.1.0"
zizmor = "1.26.1"
tombi = "1.1.6"
yamlfmt = "0.21.0"
# required for pipx backend
uv = "0.11.25"
yamllint = "1.38.0"
typos = "1.47.2"
"npm:typescript" = "6.0.3"

[settings]
experimental = true

[settings.npm]
package_manager = "bun"

[task_config]
includes = ["tasks.toml"]

[deps.bun]
auto = true
sources = ["package.json", "bun.lock"]
outputs = ["node_modules"]
run = "bun install --frozen-lockfile"

[hooks]
postinstall = """
{% if env.CI is undefined %}
  hk install --mise
{% endif %}
"""
